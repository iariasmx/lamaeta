<header class="sticky top-0 z-50 px-4 py-3 md:px-6">
  <div
    class="max-w-7xl mx-auto rounded-[2rem] bg-white/70 backdrop-blur-xl shadow-[0_20px_50px_-20px_rgba(0,0,0,0.1)] border border-white/40 overflow-hidden">
    <!-- Barra superior con gradiente sutil -->
    <div class="h-1.5 w-full bg-gradient-to-r from-sky-400 via-fuchsia-400 to-amber-400"></div>

    <div class="flex flex-col gap-4 px-6 py-3 md:flex-row md:items-center md:justify-between">
      <div class="flex items-center justify-between">
        <a routerLink="/home" class="flex items-center gap-4 group">
          <div class="relative">
            <div
              class="absolute -inset-1.5 rounded-2xl bg-gradient-to-tr from-sky-400 to-fuchsia-400 opacity-20 blur-md group-hover:opacity-40 transition duration-500">
            </div>
            <div
              class="relative h-12 w-12 rounded-2xl overflow-hidden bg-white shadow-lg flex items-center justify-center p-2 border border-slate-100">
              <img src="/assets/logo.png" alt="Inflables Fiesta logo" class="h-full w-full object-cover" />
            </div>
          </div>
          <div>
            <p
              class="text-xs font-black uppercase tracking-[0.4em] bg-gradient-to-r from-sky-600 to-fuchsia-600 bg-clip-text text-transparent">
              La Maeta</p>
            <h1
              class="text-xl font-black bg-gradient-to-r from-sky-600 via-fuchsia-600 to-amber-500 bg-clip-text text-transparent">
              Inflables</h1>
          </div>
        </a>

        <!-- Botón menú móvil con estilo -->
        <button type="button"
          class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white/80 text-slate-700 shadow-sm transition hover:bg-slate-50 md:hidden"
          (click)="menuOpen = !menuOpen" aria-label="Abrir menú móvil">
          <svg *ngIf="!menuOpen" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="menuOpen" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>

      <!-- Navegación Escritorio -->
      <nav class="hidden items-center gap-1 text-sm font-bold md:flex">
        <a routerLink="/home" routerLinkActive="bg-sky-50 text-sky-600"
          class="px-5 py-2.5 rounded-xl transition hover:text-sky-500 hover:bg-sky-50/50">Inicio</a>
        <a routerLink="/rental" routerLinkActive="bg-fuchsia-50 text-fuchsia-600"
          class="px-5 py-2.5 rounded-xl transition hover:text-fuchsia-500 hover:bg-fuchsia-50/50">Inflables</a>
        <a routerLink="/about-us" routerLinkActive="bg-amber-50 text-amber-600"
          class="px-5 py-2.5 rounded-xl transition hover:text-amber-500 hover:bg-amber-50/50">Sobre Nosotros</a>
        <a routerLink="/contact" routerLinkActive="bg-rose-50 text-rose-600"
          class="px-5 py-2.5 rounded-xl transition hover:text-rose-500 hover:bg-rose-50/50">Contacto</a>
      </nav>

      <!-- Botón de Acción -->
      <a routerLink="/rental"
        class="group relative inline-flex w-full justify-center items-center rounded-2xl bg-gradient-to-r from-sky-500 via-fuchsia-500 to-amber-500 p-[2px] shadow-xl transition-all hover:scale-105 active:scale-95 md:w-auto">
        <div class="flex w-full h-full items-center justify-center rounded-[calc(1rem+2px)] bg-white px-6 py-2.5 transition group-hover:bg-transparent">
          <span class="text-sm font-black bg-gradient-to-r from-sky-600 via-fuchsia-600 to-amber-600 bg-clip-text text-transparent group-hover:text-white transition">
            ¡Reserva Ya!
          </span>
        </div>
      </a>
    </div>

    <!-- Menú Móvil -->
    <div *ngIf="menuOpen"
      class="mx-4 mb-4 space-y-2 border-t border-slate-100 pt-4 animate-in slide-in-from-top duration-300 md:hidden">
      <a routerLink="/home" routerLinkActive="bg-sky-100 text-sky-600"
        class="block rounded-2xl px-6 py-4 text-sm font-black text-slate-700 transition hover:bg-slate-50"
        (click)="menuOpen = false">Inicio</a>
      <a routerLink="/rental" routerLinkActive="bg-fuchsia-100 text-fuchsia-600"
        class="block rounded-2xl px-6 py-4 text-sm font-black text-slate-700 transition hover:bg-slate-50"
        (click)="menuOpen = false">Inflables</a>
      <a routerLink="/about-us" routerLinkActive="bg-amber-100 text-amber-600"
        class="block rounded-2xl px-6 py-4 text-sm font-black text-slate-700 transition hover:bg-slate-50"
        (click)="menuOpen = false">Sobre Nosotros</a>
      <a routerLink="/contact" routerLinkActive="bg-rose-100 text-rose-600"
        class="block rounded-2xl px-6 py-4 text-sm font-black text-slate-700 transition hover:bg-slate-50"
        (click)="menuOpen = false">Contacto</a>
    </div>
  </div>
</header>
