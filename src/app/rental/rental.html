<div class="container mx-auto p-4">
  <h1 class="text-3xl font-bold mb-6">Inflables Disponibles</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (product of products; track product.id) {
    <div class="bg-white rounded-lg shadow p-4 border border-gray-200">
      <img [src]="product.image" [alt]="product.name" class="w-full h-48 object-cover rounded mb-4">
      <h2 class="text-xl font-semibold mb-2">{{ product.name }}</h2>
      <p class="text-gray-600 mb-3">{{ product.description }}</p>
      <div class="flex justify-between items-center">
        <div>
          <p class="text-gray-500">Capacidad: {{ product.capacity }} personas</p>
          <p class="text-gray-500">Categoría: {{ product.category }}</p>
        </div>
        <div class="text-right">
          <p class="text-2xl font-bold text-green-600">${{ product.price }} USD</p>
          <button (click)="reserveProduct(product)" [disabled]="!product.available"
            class="mt-3 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed">
            {{ product.available ? 'Reservar' : 'No disponible' }}
          </button>
        </div>
      </div>
    </div>
    }
  </div>
</div>
